name: Build Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate version from git
        id: version
        run: |
          BUILD_NUMBER=$GITHUB_RUN_NUMBER
          # Use git tag if on a tag, otherwise describe
          GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          # Strip leading 'v' if present
          GIT_VERSION=${GIT_VERSION#v}
          VERSION_NAME="${GIT_VERSION}.${BUILD_NUMBER}"
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION_NAME (code: $BUILD_NUMBER)"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.build_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          # Patch version into build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          ./gradlew assembleRelease

      - name: Rename and upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: netmon-release-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.build_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          ./gradlew assembleDebug

      - name: Rename and upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: netmon-debug-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/debug/*.apk